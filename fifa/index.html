<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Match Schedule</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#0066ff;
    --primary-dark:#0047b3;
    --bg:#f4f7fc;
    --card:#ffffff;
    --text:#1f2937;
    --muted:#6b7280;
    --border:#e5e7eb;
    --success:#10b981;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef5ff,#f8fbff);
    padding:40px 20px;
    color:var(--text);
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:2.5rem;
    font-weight:700;
    color:var(--primary);
}

.header p{
    color:var(--muted);
    margin-top:8px;
}

.accordion{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.match-card{
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    transition:.3s;
}

.match-card:hover{
    transform:translateY(-2px);
}

.accordion-btn{
    width:100%;
    border:none;
    background:white;
    cursor:pointer;
    padding:20px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.match-summary{
    display:flex;
    align-items:center;
    gap:18px;
}

.team{
    font-weight:600;
    font-size:1rem;
}

.vs{
    color:var(--muted);
    font-weight:500;
}

.match-time{
    font-size:.9rem;
    color:var(--primary);
    font-weight:600;
}

.arrow{
    font-size:1.3rem;
    transition:.3s;
}

.match-card.active .arrow{
    transform:rotate(180deg);
}

.content{
    max-height:0;
    overflow:hidden;
    transition:max-height .4s ease;
    background:#fafcff;
}

.content-inner{
    padding:20px 25px;
    border-top:1px solid var(--border);
}

.details{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.detail-box{
    background:white;
    padding:15px;
    border-radius:12px;
    border:1px solid var(--border);
}

.label{
    font-size:.8rem;
    color:var(--muted);
}

.value{
    margin-top:4px;
    font-weight:600;
}

.status{
    display:inline-block;
    margin-top:15px;
    background:#ecfdf5;
    color:var(--success);
    padding:8px 14px;
    border-radius:999px;
    font-size:.85rem;
    font-weight:600;
}

@media(max-width:600px){
    .match-summary{
        flex-direction:column;
        align-items:flex-start;
        gap:5px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>⚽ FIFA Match Schedule</h1>
        <p>Upcoming FIFA Fixtures</p>
    </div>

    <div class="accordion">

        <!-- Match 1 -->
        <div class="match-card">
            <button class="accordion-btn">
                <div class="match-summary">
                    <span class="team">Argentina 🇦🇷</span>
                    <span class="vs">vs</span>
                    <span class="team">Brazil 🇧🇷</span>
                    <span class="match-time">20:00 UTC</span>
                </div>
                <span class="arrow">⌄</span>
            </button>

            <div class="content">
                <div class="content-inner">
                    <div class="details">
                        <div class="detail-box">
                            <div class="label">Date</div>
                            <div class="value">June 20, 2026</div>
                        </div>

                        <div class="detail-box">
                            <div class="label">Venue</div>
                            <div class="value">MetLife Stadium</div>
                        </div>

                        <div class="detail-box">
                            <div class="label">Competition</div>
                            <div class="value">FIFA World Cup</div>
                        </div>

                        <div class="detail-box">
                            <div class="label">Round</div>
                            <div class="value">Quarter Final</div>
                        </div>
                    </div>

                    <div class="status">Scheduled</div>
                </div>
            </div>
        </div>

        <!-- Match 2 -->
        <div class="match-card">
            <button class="accordion-btn">
                <div class="match-summary">
                    <span class="team">France 🇫🇷</span>
                    <span class="vs">vs</span>
                    <span class="team">Spain 🇪🇸</span>
                    <span class="match-time">17:00 UTC</span>
                </div>
                <span class="arrow">⌄</span>
            </button>

            <div class="content">
                <div class="content-inner">
                    <div class="details">
                        <div class="detail-box">
                            <div class="label">Date</div>
                            <div class="value">June 21, 2026</div>
                        </div>

                        <div class="detail-box">
                            <div class="label">Venue</div>
                            <div class="value">SoFi Stadium</div>
                        </div>

                        <div class="detail-box">
                            <div class="label">Competition</div>
                            <div class="value">FIFA World Cup</div>
                        </div>

                        <div class="detail-box">
                            <div class="label">Round</div>
                            <div class="value">Quarter Final</div>
                        </div>
                    </div>

                    <div class="status">Scheduled</div>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
document.querySelectorAll('.accordion-btn').forEach(btn => {
    btn.addEventListener('click', () => {

        const card = btn.parentElement;
        const content = card.querySelector('.content');

        card.classList.toggle('active');

        if(content.style.maxHeight){
            content.style.maxHeight = null;
        } else {
            content.style.maxHeight = content.scrollHeight + 'px';
        }
    });
});
</script>

</body>
</html>
