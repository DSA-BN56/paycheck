<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS Speaker - Transaction Dashboard</title>
  <!-- Google Fonts: Outfit for body, JetBrains Mono for logs/codes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-theme" style="visibility: hidden;">
  <!-- Background glow effects -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="pulse-icon">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v1a7 7 0 0 1-14 0v-1" />
            <line x1="12" x2="12" y1="19" y2="22" />
          </svg>
        </div>
        <div class="logo-text">
          <h1>SMS Speaker</h1>
          <p>Real-time Transaction Monitor</p>
        </div>
      </div>

      <div class="header-actions">
        <!-- Status Indicator -->
        <!-- removed status idicator -->

        <!-- Refresh Button -->
        <!-- Refresh Button Removed-->

        <!-- Settings Button -->
        <!-- removed settings button-->

        <!-- Log Out Button -->
        <button id="logout-btn" class="icon-btn logout-btn" title="Log Out">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" x2="9" y1="12" y2="12" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Metrics Section -->
    <section class="metrics-grid">
      <!-- Total Volume Card -->
      <div class="metric-card glass">
        <div class="metric-info">
          <span class="metric-title">Total Credited</span>
          <h2 id="stat-total-amount">₹0.00</h2>
        </div>
        <div class="metric-icon val-green">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" x2="12" y1="2" y2="22" />
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
          </svg>
        </div>
      </div>

      <!-- Transaction Count Card -->
      <div class="metric-card glass">
        <div class="metric-info">
          <span class="metric-title">Transactions</span>
          <h2 id="stat-total-count">0</h2>
        </div>
        <div class="metric-icon val-blue">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
          </svg>
        </div>
      </div>

      <!-- Active Senders Card -->
      <div class="metric-card glass">
        <div class="metric-info">
          <span class="metric-title">Creditors</span>
          <h2 id="stat-total-creditors">0</h2>
        </div>
        <div class="metric-icon val-purple">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
      </div>
    </section>

    <!-- Main Content Layout -->
    <main class="dashboard-body">

      <!-- Filters and Live Control Bar -->
      <section class="controls-panel glass">
        <!-- Date Range Filter -->
        <div class="date-filter-row">
          <span class="control-label">Date Range:</span>
          <div class="date-filter-pills">
            <button class="date-pill" data-range="today">Today</button>
            <button class="date-pill active" data-range="3">Last 3 Days</button>
            <button class="date-pill" data-range="7">Last 7 Days</button>
            <button class="date-pill" data-range="30">Last 30 Days</button>
            <button class="date-pill" data-range="all">All Time</button>
          </div>
        </div>

        <!-- Search & Sort -->
        <div class="filter-controls">
          <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" x2="16.65" y1="21" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="Search creditor or amount...">
          </div>

          <div class="select-wrapper">
            <select id="sort-select">
              <option value="time-desc">Newest First</option>
              <option value="time-asc">Oldest First</option>
              <option value="amount-desc">Amount: High to Low</option>
              <option value="amount-asc">Amount: Low to High</option>
            </select>
          </div>
        </div>

        <!-- Live Refresh & Speech Control -->
        <div class="live-controls">
          <!-- Voice Selector -->
          <div class="voice-setup">
            <span class="control-label">Voice:</span>
            <div class="select-wrapper select-voice">
              <select id="voice-select">
                <option value="">Default System Voice</option>
              </select>
            </div>
          </div>

          <!-- TTS Auto Toggle -->
          <label class="switch-container">
            <input type="checkbox" id="auto-speak-toggle">
            <span class="slider"></span>
            <span class="switch-label">Auto Speak</span>
          </label>

          <!-- Auto Refresh Toggle -->
          <!-- Auto Refresh is removed -->
        </div>
      </section>

      <!-- Connection Alert Message -->
      <div id="connection-warning" class="warning-banner glass hidden">
        <div class="warning-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
            <line x1="12" x2="12" y1="9" y2="13" />
            <line x1="12" x2="12.01" y1="17" y2="17" />
          </svg>
        </div>
        <div class="warning-text">
          <h3>Database Connection Required</h3>
          <p>Authentication Required</p>
        </div>
        <button id="setup-btn" class="primary-btn">Configure Settings</button>
      </div>

      <div id="connection-status" class="status-badge status-disconnected">
        <span class="status-dot"></span>
        <span class="status-label">Offline</span>
      </div>
      <!-- Transactions Grid -->
      <section id="transactions-container" class="transactions-grid">
        <!-- Rendered dynamically by app.js -->
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading transactions...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Settings Drawer Overlay -->
  <!-- removed setting drawer  -->

  <!-- Speech/Voice Status Bar (shown when playing voice) -->
  <div id="speech-bar" class="speech-now-playing glass hidden">
    <div class="soundwave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="speech-text-display">
      <span class="speech-label">Speaking:</span>
      <span id="speech-text-content" class="speech-val">...</span>
    </div>
    <button id="speech-stop-btn" class="speech-stop-btn" title="Stop Reading">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2" ry="2" />
      </svg>
    </button>
  </div>

  <!-- Custom alert/notification toast -->
  <div id="toast" class="toast-container hidden"></div>

  <!-- Firebase Scripts (Only loaded if Web SDK configuration is used) -->
  <!-- removed compat imports-->

  <script type="module">

    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged,
      signOut
    }
      from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    import { firebaseConfig }
      from "./firebasesConfig.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {

      if (!user) {

        window.location.replace("index.html");

      } else {
        document.body.style.visibility = "visible";
      }

    });

    document.getElementById("logout-btn").addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.replace("index.html");
      } catch (err) {
        console.error("Logout failed:", err);
      }
    });

  </script>
  <script type="module" src="app.js"></script>
</body>

</html>
